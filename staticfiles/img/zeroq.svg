<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Fondo circular con gradiente -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Círculo interior blanco -->
  <circle cx="128" cy="128" r="110" fill="white"/>
  
  <!-- Símbolo central - Z moderna -->
  <g transform="translate(70, 90)">
    <!-- Parte superior horizontal -->
    <line x1="10" y1="8" x2="50" y2="8" stroke="#667eea" stroke-width="4" stroke-linecap="round"/>
    <!-- Diagonal -->
    <line x1="50" y1="8" x2="10" y2="48" stroke="#667eea" stroke-width="4" stroke-linecap="round"/>
    <!-- Parte inferior horizontal -->
    <line x1="10" y1="48" x2="50" y2="48" stroke="#667eea" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Símbolo central - Q moderna -->
  <g transform="translate(118, 100)">
    <!-- Círculo del Q -->
    <circle cx="24" cy="24" r="20" fill="none" stroke="#764ba2" stroke-width="4"/>
    <!-- Cola del Q -->
    <path d="M 42 40 Q 48 50 45 58" fill="none" stroke="#764ba2" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Texto "ZERO Q" debajo -->
  <text x="128" y="180" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#1e293b" letter-spacing="2">ZERO Q</text>
  
  <!-- Línea decorativa -->
  <line x1="80" y1="190" x2="176" y2="190" stroke="#667eea" stroke-width="2" opacity="0.5"/>
  
  <!-- Pequeño punto decorativo -->
  <circle cx="128" cy="210" r="3" fill="#764ba2" opacity="0.6"/>
</svg>