{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Stock - Productos</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <style>
        table { width:100%; border-collapse:collapse; }
        th, td { padding:8px; border:1px solid #ddd; text-align:left; }
        th { background:#2b6cb0; color:white; }
        .actions a { margin-right:6px; }
    </style>
</head>
<body>
    <h2>Productos en Stock</h2>
    <p><a href="{% url 'stock:product_add' %}">➕ Agregar Producto</a></p>
    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>SKU</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for p in productos %}
            <tr>
                <td>{{ p.nombre }}</td>
                <td>{{ p.sku }}</td>
                <td>{{ p.categoria }}</td>
                <td>${{ p.precio }}</td>
                <td>{{ p.cantidad }}</td>
                <td class="actions">
                    <a href="{% url 'stock:product_edit' p.pk %}">Editar</a>
                    <a href="{% url 'stock:product_delete' p.pk %}">Eliminar</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="6">No hay productos.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
