<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner de Códigos BX - FACTORA POS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #495057;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            width: 100%;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
            padding: 8px 16px;
            margin-right: 8px;
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid;
        }
        
        .alert-success {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }
        
        .alert-danger {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }
        
        .alert-warning {
            background: #fff3cd;
            border-color: #ffc107;
            color: #856404;
        }
        
        .alert-info {
            background: #d1ecf1;
            border-color: #17a2b8;
            color: #0c5460;
        }
        
        .estado-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .estado-badge.valido {
            background: #d4edda;
            color: #155724;
        }
        
        .estado-badge.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .historial {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 15px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .historial-item {
            padding: 10px;
            border-bottom: 1px solid #e9ecef;
            font-size: 13px;
        }
        
        .historial-item:last-child {
            border-bottom: none;
        }
        
        .timestamp {
            color: #6c757d;
            font-size: 12px;
        }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading .loader {
            display: block;
        }
        
        .detalles {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 14px;
        }
        
        .detalles-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #e9ecef;
        }
        
        .detalles-row:last-child {
            border-bottom: none;
        }
        
        .detalles-label {
            font-weight: 600;
            color: #495057;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 Control de Códigos BX</h1>
            <p>Sistema de entrada/salida con scanner 2D - FACTORA POS</p>
        </div>
        
        <div class="content">
            <!-- SECCIÓN: VALIDACIÓN DE CÓDIGO -->
            <div>
                <div class="section-title">✓ Validar Código</div>
                
                <form id="formValidar">
                    <div class="form-group">
                        <label for="tipoMovimiento">Tipo de Movimiento:</label>
                        <select id="tipoMovimiento" required>
                            <option value="ENTRADA">📥 ENTRADA</option>
                            <option value="SALIDA">📤 SALIDA</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="codigoBX">Código BX (Scanner):</label>
                        <input 
                            type="text" 
                            id="codigoBX" 
                            placeholder="Escanea el código 2D..."
                            autocomplete="off"
                            required
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="productoId">ID Producto (opcional):</label>
                        <input 
                            type="number" 
                            id="productoId" 
                            placeholder="Ej: 1"
                        >
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        Validar Código
                    </button>
                </form>
                
                <div id="resultadoValidacion"></div>
                
                <div class="section-title" style="margin-top: 30px;">📊 Historial</div>
                <button class="btn btn-secondary" onclick="limpiarHistorial()">
                    Limpiar
                </button>
                <div class="historial" id="historialCodigosLocales"></div>
            </div>
            
            <!-- SECCIÓN: AUDITORÍA -->
            <div>
                <div class="section-title">🔍 Auditoría de Código</div>
                
                <form id="formAuditoria">
                    <div class="form-group">
                        <label for="codigoAuditoria">Código BX a Auditar:</label>
                        <input 
                            type="text" 
                            id="codigoAuditoria" 
                            placeholder="BX9M8232"
                            autocomplete="off"
                        >
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        Obtener Historial
                    </button>
                </form>
                
                <div id="resultadoAuditoria"></div>
                
                <div class="section-title" style="margin-top: 30px;">🛡️ Integridad</div>
                
                <form id="formIntegridad">
                    <div class="form-group">
                        <label for="codigoIntegridad">Código BX a Validar:</label>
                        <input 
                            type="text" 
                            id="codigoIntegridad" 
                            placeholder="BX9M8232"
                            autocomplete="off"
                        >
                    </div>
                    
                    <button type="submit" class="btn btn-primary">
                        Validar Integridad
                    </button>
                </form>
                
                <div id="resultadoIntegridad"></div>
            </div>
        </div>
    </div>
    
    <!-- Incluir el script del validador -->
    <script src="/static/js/validador_codigo_bx.js"></script>
    
    <script>
        // Crear instancia del validador
        const validador = new ValidadorCodigoBX({
            apiBaseUrl: '/stock/api/movimientos',
            debug: true
        });
        
        let historialLocal = [];
        
        // ============================================
        // FORM: VALIDAR CÓDIGO
        // ============================================
        document.getElementById('formValidar').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const tipo = document.getElementById('tipoMovimiento').value;
            const codigo = document.getElementById('codigoBX').value.trim();
            const productoId = document.getElementById('productoId').value || null;
            
            const divResultado = document.getElementById('resultadoValidacion');
            divResultado.innerHTML = '<div class="loader"></div>';
            
            try {
                const resultado = await validador.validarCodigo(codigo, tipo, productoId);
                
                mostrarResultadoValidacion(resultado);
                agregarAlHistorial(resultado);
                
            } catch (error) {
                divResultado.innerHTML = `<div class="alert alert-danger">❌ Error: ${error.message}</div>`;
            }
            
            // Limpiar input
            document.getElementById('codigoBX').value = '';
            document.getElementById('codigoBX').focus();
        });
        
        // ============================================
        // FORM: AUDITORÍA
        // ============================================
        document.getElementById('formAuditoria').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const codigo = document.getElementById('codigoAuditoria').value.trim();
            const divResultado = document.getElementById('resultadoAuditoria');
            
            if (!codigo) {
                divResultado.innerHTML = '<div class="alert alert-warning">⚠️ Ingresa un código</div>';
                return;
            }
            
            divResultado.innerHTML = '<div class="loader"></div>';
            
            try {
                const resultado = await validador.obtenerHistorial(codigo);
                
                if (resultado.error) {
                    divResultado.innerHTML = `<div class="alert alert-danger">❌ ${resultado.error}</div>`;
                    return;
                }
                
                let html = `<div class="alert alert-info">`;
                html += `<strong>${resultado.codigo}</strong><br>`;
                html += `Total movimientos: <strong>${resultado.total_movimientos}</strong><br>`;
                html += `Estado: <strong>${resultado.status_actual}</strong><br>`;
                if (resultado.producto) {
                    html += `Producto: <strong>${resultado.producto}</strong><br>`;
                    html += `Stock actual: <strong>${resultado.stock_actual}</strong>`;
                }
                html += `</div>`;
                
                if (resultado.movimientos && resultado.movimientos.length > 0) {
                    html += '<div class="historial">';
                    resultado.movimientos.forEach(mov => {
                        html += `<div class="historial-item">
                            <strong>${mov.tipo}</strong> × ${mov.cantidad} unidades<br>
                            Stock: ${mov.stock_anterior} → ${mov.stock_nuevo}<br>
                            Usuario: ${mov.usuario} | <span class="timestamp">${mov.fecha}</span>
                        </div>`;
                    });
                    html += '</div>';
                }
                
                divResultado.innerHTML = html;
                
            } catch (error) {
                divResultado.innerHTML = `<div class="alert alert-danger">❌ Error: ${error.message}</div>`;
            }
        });
        
        // ============================================
        // FORM: INTEGRIDAD
        // ============================================
        document.getElementById('formIntegridad').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const codigo = document.getElementById('codigoIntegridad').value.trim();
            const divResultado = document.getElementById('resultadoIntegridad');
            
            if (!codigo) {
                divResultado.innerHTML = '<div class="alert alert-warning">⚠️ Ingresa un código</div>';
                return;
            }
            
            divResultado.innerHTML = '<div class="loader"></div>';
            
            try {
                const resultado = await validador.validarIntegridad(codigo);
                
                if (resultado.error) {
                    divResultado.innerHTML = `<div class="alert alert-danger">❌ ${resultado.error}</div>`;
                    return;
                }
                
                const clase = resultado.es_consistente ? 'alert-success' : 'alert-danger';
                let html = `<div class="alert ${clase}">`;
                
                if (resultado.es_consistente) {
                    html += `✓ <strong>Código consistente</strong>`;
                } else {
                    html += `✗ <strong>Anomalías detectadas</strong>`;
                }
                
                html += `</div>`;
                
                html += '<div class="detalles">';
                html += `<div class="detalles-row">
                    <span class="detalles-label">Única ENTRADA activa:</span>
                    <span>${resultado.validaciones.unica_entrada_activa ? '✓' : '✗'}</span>
                </div>`;
                html += `<div class="detalles-row">
                    <span class="detalles-label">Stock coherente:</span>
                    <span>${resultado.validaciones.stock_coherente ? '✓' : '✗'}</span>
                </div>`;
                html += `<div class="detalles-row">
                    <span class="detalles-label">Secuencia temporal:</span>
                    <span>${resultado.validaciones.secuencia_temporal ? '✓' : '✗'}</span>
                </div>`;
                html += `<div class="detalles-row">
                    <span class="detalles-label">Total movimientos:</span>
                    <span>${resultado.total_movimientos}</span>
                </div>`;
                html += '</div>';
                
                if (resultado.anomalias && resultado.anomalias.length > 0) {
                    html += '<div class="alert alert-warning" style="margin-top: 15px;">';
                    html += '<strong>Anomalías:</strong><ul>';
                    resultado.anomalias.forEach(anom => {
                        html += `<li>${anom}</li>`;
                    });
                    html += '</ul></div>';
                }
                
                divResultado.innerHTML = html;
                
            } catch (error) {
                divResultado.innerHTML = `<div class="alert alert-danger">❌ Error: ${error.message}</div>`;
            }
        });
        
        // ============================================
        // FUNCIONES AUXILIARES
        // ============================================
        
        function mostrarResultadoValidacion(resultado) {
            const div = document.getElementById('resultadoValidacion');
            const clase = resultado.valido ? 'alert-success' : 'alert-danger';
            
            let html = `<div class="alert ${clase}">`;
            html += `<strong>${resultado.estado}</strong><br>`;
            html += `${resultado.mensaje}`;
            
            if (resultado.producto_nombre) {
                html += `<div class="detalles" style="margin-top: 10px;">`;
                html += `<div class="detalles-row">
                    <span class="detalles-label">Producto:</span>
                    <span>${resultado.producto_nombre}</span>
                </div>`;
                if (resultado.stock_actual !== undefined) {
                    html += `<div class="detalles-row">
                        <span class="detalles-label">Stock:</span>
                        <span>${resultado.stock_actual}</span>
                    </div>`;
                }
                if (resultado.recomendacion) {
                    html += `<div class="detalles-row">
                        <span class="detalles-label">💡 Recomendación:</span>
                        <span>${resultado.recomendacion}</span>
                    </div>`;
                }
                html += `</div>`;
            }
            
            html += `</div>`;
            div.innerHTML = html;
        }
        
        function agregarAlHistorial(resultado) {
            const timestamp = new Date().toLocaleTimeString('es-ES');
            historialLocal.unshift({
                timestamp: timestamp,
                codigo: resultado.codigo,
                tipo: resultado.tipo,
                estado: resultado.estado,
                valido: resultado.valido
            });
            
            // Limitar a últimos 20 registros
            if (historialLocal.length > 20) {
                historialLocal.pop();
            }
            
            renderizarHistorial();
        }
        
        function renderizarHistorial() {
            const div = document.getElementById('historialCodigosLocales');
            
            if (historialLocal.length === 0) {
                div.innerHTML = '<p style="color: #999; text-align: center; padding: 20px;">Sin registros</p>';
                return;
            }
            
            let html = '';
            historialLocal.forEach(item => {
                const icono = item.valido ? '✓' : '✗';
                const color = item.valido ? '#28a745' : '#dc3545';
                html += `<div class="historial-item">
                    <span style="color: ${color}; font-weight: bold;">${icono}</span>
                    <strong>${item.codigo}</strong> (${item.tipo})<br>
                    <span class="timestamp">${item.timestamp} - ${item.estado}</span>
                </div>`;
            });
            
            div.innerHTML = html;
        }
        
        function limpiarHistorial() {
            historialLocal = [];
            renderizarHistorial();
        }
        
        // Inicializar
        renderizarHistorial();
    </script>
</body>
</html>
